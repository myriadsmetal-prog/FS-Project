<html lang="es">
    <!--Elemento principal del documento. lang="es" indica que es el contenido está en español-->
    <head>
        <!--Contiene información de configuración de la página-->
        <meta charset="UTF-8">
        <!--Permite mostrar correctamente caracteres especiales como tildes, ñ y símbolos-->
        <meta name="viewport" content="width=device-width", initial-scale="1.0">
        <!--Permite que la página se adapte correctamente a computadoras, tablets y celulares-->
        <title>Task Manager</title>
        <!--Texto que aparecerá en la pestaña del navegador-->
        <style>
            body{
                font-family: Arial, sans-serif;
                padding: 30px;
                background-color: white;
            }
            h1{ color: #333;
                margin-bottom: 20px;
            }
            input{
                padding: 10px;
                width: 250px;
                font-size: 16px;
            }
            button{
                padding: 10px 15px;
                font-size: 16px;
                cursor: pointer;
            }
            ul{
                padding: 0;
                margin-top: 20px;
            }
            li{
                list-style: none;
                background-color: white;
                padding: 10px;
                margin-bottom: 8px;
            }
        </style>
    </head>
    <body>
        <h1>Task Manager</h1>
        <!-- Aquí se colocará  todo el contenido visible de la página-->
         <input type="text"
          id="taskInput"
          placeholder="Escribe una nueva tarea">
          <button id="addTaskBtn">
            Agregar Tarea
          </button>
          <ul id="taskList">
            <li>Estudiar JavaScript</li>
          </ul>
          <script>
            const taskInput = document.getElementById("taskInput");
            const addTaskBtn = document.getElementById("addTaskBtn");
            const taskList = document.getElementById("taskList");
            const addTask = () => {
                const taskText = taskInput.value.trim();
                if(taskText == ""){
                    return;
                }
                const li = document.createElement("li");

                const taskSpan = document.createElement("span");
                taskSpan.textContent = taskText;
                const deleteButton = document.createElement("button");
                deleteButton.textContent = "Eliminar";
                deleteButton.classList.add("delete-btn");
                deleteButton.addEventListener("click", () =>{
                    li.remove();
                });
                li.appendChild(taskSpan);
                li.appendChild(deleteButton);
                taskList.appendChild(li);
                taskInput.value="";
                taskInput.focus();
                };
                addTaskBtn.addEventListener("click", addTask);
                taskInput.addEventListener("keydown", (event) => {
                    if(event.key === "Enter"){
                        addTask();
                    }
                });
                
          </script>
    </body>
</html>
<!--Fin del documento HTML-->
